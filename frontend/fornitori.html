<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fornitori — Aura</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/aura.css">
<style>
  #aura-main{justify-content:flex-start}
  .fornitori-header{margin-bottom:var(--sp-6);display:flex;flex-direction:column;gap:var(--sp-4)}
  .fornitori-title{font-family:var(--font-display);font-weight:700;font-size:32px}
  .filtri{display:flex;gap:var(--sp-3);flex-wrap:wrap;align-items:center}
  .input{flex:1;min-width:200px}
  .select{flex:0 0 auto;min-width:160px}
  .tabella{width:100%;border-collapse:collapse;margin-top:var(--sp-4)}
  .tabella th{
    background:rgba(255,255,255,.06);padding:var(--sp-3) var(--sp-4);
    text-align:left;font-size:12px;font-weight:600;color:var(--text-on-dark-muted);
    text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--glass-border);
  }
  .tabella td{padding:var(--sp-4);border-bottom:1px solid var(--glass-border);font-size:14px}
  .tabella tbody tr{transition:background .15s}
  .tabella tbody tr:hover{background:rgba(255,255,255,.04)}
  .nome-col{font-weight:600;color:#fff}
  .email-link{color:#fff;text-decoration:none;cursor:pointer}
  .email-link:hover{text-decoration:underline}
  .phone-link{color:#fff;cursor:pointer}
  .phone-link:hover{text-decoration:underline}
  .empty-state{text-align:center;padding:var(--sp-12);color:var(--text-on-dark-muted)}
  @media(max-width:1024px){
    .tabella{font-size:13px}
    .tabella th,.tabella td{padding:var(--sp-2) var(--sp-3)}
  }
</style>
</head>
<body>
<div class="aura-bg"></div>
<div class="app" id="aura-shell"></div>

<script src="/aura.js"></script>
<script>
  // Costruisce la shell con "Fornitori" attivo nella nav
  auraShell({ active: 'fornitori' });

  // Inietta il contenuto Fornitori nel main
  const main = document.getElementById('aura-main');
  main.style.overflow = 'auto';
  main.innerHTML = `
    <div style="width:100%">
      <div class="fornitori-header">
        <h1 class="fornitori-title">Fornitori</h1>
        <div class="filtri">
          <input class="input" id="filtro-nome" placeholder="Cerca per nome…" />
          <select class="select" id="filtro-ruolo">
            <option value="">Tutti i ruoli</option>
          </select>
        </div>
      </div>

      <div id="errore"></div>

      <table class="tabella">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Professione</th>
            <th>Email</th>
            <th>Telefono</th>
          </tr>
        </thead>
        <tbody id="tabella-body">
          <tr><td colspan="4" class="empty-state">Caricamento…</td></tr>
        </tbody>
      </table>
    </div>`;

  const API = "";
  let fornitori = [];

  async function carica(){
    try{
      const res = await fetch(API + "/api/fornitori");
      if(!res.ok) throw new Error(await res.json().then(d => d.detail));
      const data = await res.json();
      fornitori = data.data || [];
      renderTabella();
      popolaFiltriRuoli();
    }catch(e){
      document.getElementById("errore").innerHTML = `<div style="background:var(--glass-fill);border:1px solid var(--glass-border);border-radius:var(--r-md);padding:var(--sp-3);color:var(--color-error);margin-bottom:var(--sp-4)">⚠️ ${e.message}</div>`;
    }
  }

  function popolaFiltriRuoli(){
    const ruoli = [...new Set(fornitori.map(f => f.ruolo))].sort();
    const select = document.getElementById("filtro-ruolo");
    ruoli.forEach(r => {
      const opt = document.createElement("option");
      opt.value = r;
      opt.textContent = r;
      select.appendChild(opt);
    });
  }

  function filtra(){
    const nome = document.getElementById("filtro-nome").value.toLowerCase();
    const ruolo = document.getElementById("filtro-ruolo").value;

    const filtrati = fornitori.filter(f =>
      (f.nome.toLowerCase().includes(nome) || f.cognome.toLowerCase().includes(nome)) &&
      (!ruolo || f.ruolo === ruolo)
    );
    renderTabella(filtrati);
  }

  function renderTabella(lista = fornitori){
    const tbody = document.getElementById("tabella-body");
    if(!lista.length){
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Nessun risultato.</td></tr>';
      return;
    }

    tbody.innerHTML = lista.map(f => `<tr>
      <td class="nome-col">${f.nome} ${f.cognome}</td>
      <td>${f.ruolo}</td>
      <td><a class="email-link" href="mailto:${f.email}" title="${f.email}">${f.email !== "—" ? f.email : "—"}</a></td>
      <td><a class="phone-link" href="tel:${f.telefono}" title="${f.telefono}">${f.telefono !== "—" ? f.telefono : "—"}</a></td>
    </tr>`).join("");
  }

  // Aggancia i filtri
  document.getElementById("filtro-nome").addEventListener("input", filtra);
  document.getElementById("filtro-ruolo").addEventListener("change", filtra);

  carica();
</script>
</body>
</html>
