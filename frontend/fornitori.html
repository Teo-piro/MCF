<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fornitori Freelance – Flatmates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8ee;
      padding: 24px;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a3a;
      padding-bottom: 16px;
    }

    header h1 { font-size: 28px; font-weight: 700; }
    header a {
      color: #a59bff;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 14px;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      transition: all .2s;
    }
    header a:hover { border-color: #6c63ff; color: #fff; }

    .container { max-width: 1200px; margin: 0 auto; }

    .filtri {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filtri select, .filtri input {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e8e8ee;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .filtri select:focus, .filtri input:focus {
      border-color: #6c63ff;
    }

    .tabella {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      overflow: hidden;
    }

    .tabella th {
      background: #121218;
      padding: 14px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid #2a2a3a;
    }

    .tabella td {
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a3a;
      font-size: 14px;
    }

    .tabella tbody tr:hover {
      background: #232230;
    }

    .tabella tr:last-child td {
      border-bottom: none;
    }

    .nome-col {
      font-weight: 600;
      color: #fff;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .status-fidat {
      background: rgba(34, 197, 94, .15);
      color: #22c55e;
    }

    .status-testat {
      background: rgba(59, 130, 246, .15);
      color: #3b82f6;
    }

    .status-new {
      background: rgba(168, 85, 247, .15);
      color: #a855f7;
    }

    .contatto {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      color: #a59bff;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #666;
      font-size: 15px;
    }

    .error {
      background: #2a1f1f;
      color: #ff8a8a;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #4a2f2f;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>👥 Fornitori Freelance</h1>
    <p style="font-size: 13px; color: #888; margin-top: 4px;">Team e collaboratori disponibili per le produzioni</p>
  </div>
  <a href="/magazzino.html">📦 Magazzino</a>
</header>

<div class="container">
  <div class="filtri">
    <input type="text" id="filtro-nome" placeholder="Cerca per nome…" />
    <select id="filtro-ruolo">
      <option value="">Tutti i ruoli</option>
    </select>
  </div>

  <div id="errore"></div>

  <table class="tabella">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Professione</th>
        <th>Affidabilità</th>
        <th>Email</th>
        <th>Telefono</th>
      </tr>
    </thead>
    <tbody id="tabella-body">
      <tr><td colspan="6" class="empty-state">Caricamento…</td></tr>
    </tbody>
  </table>
</div>

<script>
  const API = "";
  let fornitori = [];

  // Carica i fornitori all'avvio
  async function carica() {
    try {
      const res = await fetch(API + "/api/fornitori");
      if (!res.ok) throw new Error(await res.json().then(d => d.detail));
      const data = await res.json();
      fornitori = data.data || [];
      renderTabella();
      popolaFiltriRuoli();
    } catch (e) {
      document.getElementById("errore").innerHTML = `<div class="error">⚠️ Errore: ${e.message}</div>`;
    }
  }


  function popolaFiltriRuoli() {
    const ruoli = [...new Set(fornitori.map(f => f.ruolo))].sort();
    const select = document.getElementById("filtro-ruolo");
    ruoli.forEach(r => {
      const opt = document.createElement("option");
      opt.value = r;
      opt.textContent = r;
      select.appendChild(opt);
    });
  }

  function filtra() {
    const nome = document.getElementById("filtro-nome").value.toLowerCase();
    const ruolo = document.getElementById("filtro-ruolo").value;

    const filtrati = fornitori.filter(f =>
      (f.nome.toLowerCase().includes(nome) || f.cognome.toLowerCase().includes(nome)) &&
      (!ruolo || f.ruolo === ruolo)
    );
    renderTabella(filtrati);
  }

  function renderTabella(lista = fornitori) {
    const tbody = document.getElementById("tabella-body");
    if (!lista.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nessun risultato.</td></tr>';
      return;
    }

    tbody.innerHTML = lista.map(f => {
      const badge = `<span class="status-badge status-${f.affidabilita.replace("+", "").toLowerCase()}">${f.affidabilita}</span>`;
      return `<tr>
        <td class="nome-col">${f.nome} ${f.cognome}</td>
        <td>${f.ruolo}</td>
        <td>${badge}</td>
        <td><a href="mailto:${f.email}" class="contatto">${f.email !== "—" ? f.email : "—"}</a></td>
        <td><a href="tel:${f.telefono}" class="contatto">${f.telefono !== "—" ? f.telefono : "—"}</a></td>
      </tr>`;
    }).join("");
  }

  // Event listeners filtri
  ["filtro-nome", "filtro-ruolo"].forEach(id =>
    document.getElementById(id).addEventListener("input", filtra));

  carica();
</script>

</body>
</html>
