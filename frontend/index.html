<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aura — Clarity for creative teams</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/aura.css">
<style>
  /* Stato empty (hero) vs active (conversazione) del pannello chat */
  #aura-main.empty{justify-content:center;align-items:center}
  #aura-main.empty .chat-scroll{display:none}
  #aura-main.empty .chat-composer{width:min(580px,100%);display:flex;flex-direction:column;align-items:center;gap:30px}
  #aura-main:not(.empty) .hero-title{display:none}
  #aura-main:not(.empty) .chat-composer{width:100%;margin-top:var(--sp-4)}
  #aura-main:not(.empty) .chat-scroll{display:flex}
  .chat-composer{width:100%}
  .user-avatar{background:radial-gradient(circle at 35% 30%, var(--color-accent-hover), var(--color-accent) 70%)}
  .ai-avatar{background:transparent;border:none;box-shadow:none}
</style>
</head>
<body>
<div class="aura-bg"></div>
<div class="app" id="aura-shell"></div>

<script src="/aura.js"></script>
<script>
  // Costruisce la shell (topbar + sidebar). Home = chat, nessuna voce nav attiva.
  auraShell({ active: '' });

  // Inietta il contenuto chat nel main
  const main = document.getElementById('aura-main');
  main.classList.add('empty');
  main.innerHTML = `
    <div class="chat-scroll" id="chat-container"></div>
    <div class="chat-composer">
      <h1 class="hero-title">Clarity for<br>creative teams</h1>
      <div class="chat-bar">
        <input id="user-input" placeholder="Come posso aiutarti?" autocomplete="off" />
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Invia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
    </div>`;

  const chatContainer = document.getElementById('chat-container');
  const userInput     = document.getElementById('user-input');
  const sendBtn       = document.getElementById('send-btn');
  let history = [];

  userInput.addEventListener('keydown', e => {
    if(e.key === 'Enter'){ e.preventDefault(); sendMessage(); }
  });

  function attiva(){ main.classList.remove('empty'); }

  async function sendMessage(){
    const text = userInput.value.trim();
    if(!text || sendBtn.disabled) return;

    attiva();
    appendBubble('user', text);
    history.push({ role:'user', content:text });

    userInput.value = '';
    sendBtn.disabled = true;
    const typing = showTyping();

    try{
      const res = await fetch('/api/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ messages: history }),
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      typing.remove();
      appendBubble('assistant', data.reply);
      history.push({ role:'assistant', content:data.reply });
    }catch(err){
      typing.remove();
      appendBubble('assistant', `Errore: ${err.message}\n\nVerifica che il backend sia attivo (./start.sh).`);
    }finally{
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  function formatText(text){
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>');
  }

  function appendBubble(role, text){
    const row = document.createElement('div');
    row.className = `bubble-row ${role==='user'?'user':'ai'}`;
    const avatarClass = role === 'user' ? 'bubble-avatar user-avatar' : 'bubble-avatar ai-avatar';
    const avatarContent = role === 'user'
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="3.4"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg>'
      : '<img src="/aura-logo.png" alt="Aura" style="width:100%;height:100%;object-fit:contain" />';
    row.innerHTML = `
      <div class="${avatarClass}">${avatarContent}</div>
      <div class="bubble">${formatText(text)}</div>`;
    chatContainer.appendChild(row);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return row;
  }

  function showTyping(){
    const row = document.createElement('div');
    row.className = 'bubble-row ai typing';
    row.innerHTML = `
      <div class="bubble-avatar">✦</div>
      <div class="bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
    chatContainer.appendChild(row);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return row;
  }

  userInput.focus();
</script>
</body>
</html>
