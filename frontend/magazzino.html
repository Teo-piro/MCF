<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attrezzatura — Aura</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/it.js"></script>
<link rel="stylesheet" href="/aura.css">
<style>
  #aura-main{display:flex;flex-direction:column;gap:var(--sp-6);padding:var(--sp-6);overflow:auto}
  @media(max-width:1280px){#aura-main{flex-direction:column}}

  .section-title{font-family:var(--font-display);font-weight:700;font-size:24px;margin-bottom:var(--sp-4)}

  /* Inventario */
  .inv-search{margin-bottom:var(--sp-4)}
  .inv-groups{display:flex;flex-direction:column;gap:var(--sp-3);max-height:500px;overflow-y:auto}
  .inv-group-title{font-size:12px;text-transform:uppercase;letter-spacing:.2em;color:#fff;margin:var(--sp-3) 0 6px;margin-top:var(--sp-4);font-weight:600}
  .inv-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 10px;background:rgba(255,255,255,.04);border-radius:var(--r-sm);font-size:13px;
    transition:background .15s;cursor:pointer;
  }
  .inv-item:hover{background:rgba(255,255,255,.08)}
  .inv-code{font-family:var(--font-display);font-size:12px;color:#fff;margin-right:8px;font-weight:600}
  .inv-badge{font-size:11px;color:var(--text-on-dark-muted);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px}

  /* Prenotazione form */
  .form-row{display:flex;gap:var(--sp-3);margin-bottom:var(--sp-4)}
  .form-row>div{flex:1}
  .form-label{display:block;font-size:12px;color:var(--text-on-dark-muted);margin:var(--sp-2) 0 6px;text-transform:uppercase;letter-spacing:.3px}
  .form-label.required::after{content:" *";color:var(--color-error)}

  /* Carrello */
  .carrello{margin:var(--sp-4) 0;display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
  .cart-item{
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);
    padding:8px 10px;font-size:13px;transition:background .15s;
  }
  .cart-item.over{background:#2a1620;border-color:#7a1f3f}
  .cart-item-qty{background:var(--color-primary);color:#fff;border-radius:4px;padding:2px 6px;font-weight:600;font-size:11px;margin-right:6px}
  .cart-item-del{background:none;border:none;color:#ff8a8a;cursor:pointer;padding:0 4px;font-size:14px}
  .cart-empty{color:var(--text-on-dark-muted);font-size:12px;font-style:italic;padding:8px 0}

  /* Calendario */
  .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-3)}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:11px}
  .cal-dow{text-align:center;color:var(--text-on-dark-muted);padding:4px 0}
  .cal-day{aspect-ratio:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
  .cal-day:hover{background:rgba(255,255,255,.1)}
  .cal-day.today{border-color:var(--color-primary)}
  .cal-day.selected{background:var(--color-primary);color:#000;font-weight:600}

  /* Prenotazioni lista */
  .pren-list{max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
  .pren-card{
    background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:var(--r-md);
    padding:var(--sp-3);font-size:13px;transition:background .15s;cursor:pointer;
  }
  .pren-card:hover{background:rgba(255,255,255,.08)}
  .pren-title{font-weight:600;color:#fff;margin-bottom:4px}
  .pren-meta{color:var(--text-on-dark-muted);font-size:12px}
  .pren-close{float:right;background:none;border:none;color:#ff8a8a;cursor:pointer;padding:0}

  /* Modale */
  .modal-backdrop{position:fixed;inset:0;background:rgba(22,34,106,.65);display:none;z-index:100;align-items:center;justify-content:center}
  .modal-backdrop.show{display:flex}
  .modal-box{background:#1a1a24;border:1px solid var(--glass-border);border-radius:var(--r-lg);padding:var(--sp-6);max-width:560px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-card)}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--sp-3);margin-bottom:var(--sp-4)}
  .modal-title{font-size:20px;font-weight:600}
  .modal-close{background:none;border:none;color:#999;font-size:24px;cursor:pointer;padding:0}
  .modal-close:hover{color:#fff}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);margin:var(--sp-4) 0}
  .modal-field{display:flex;flex-direction:column}
  .modal-label{font-size:11px;color:var(--text-on-dark-muted);text-transform:uppercase;margin-bottom:4px}
  .modal-value{font-size:14px;color:#fff}
  .modal-items{background:rgba(255,255,255,.04);border:1px solid var(--glass-border);border-radius:var(--r-md);padding:var(--sp-3);margin:var(--sp-4) 0}
  .modal-item{margin-bottom:8px;font-size:13px;color:#fff}
  .modal-actions{display:flex;gap:var(--sp-3);margin-top:var(--sp-4)}

  .required::after{content:" *";color:var(--color-error)}

  /* Calendario */
  .cal-wrap{background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:var(--r-md);padding:var(--sp-4)}
  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-4)}
  .cal-month{font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;text-transform:capitalize}
  .cal-nav-btn{background:none;border:1px solid var(--glass-border);border-radius:var(--r-pill);color:#fff;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s}
  .cal-nav-btn:hover{background:var(--glass-fill)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-dow{text-align:center;font-size:11px;color:rgba(255,255,255,.5);padding:4px 0;text-transform:uppercase;letter-spacing:.1em}
  .cal-cell{min-height:52px;background:rgba(255,255,255,.03);border-radius:var(--r-sm);padding:4px;position:relative;transition:background .15s}
  .cal-cell:hover{background:rgba(255,255,255,.07)}
  .cal-cell.today .cal-day-num{background:var(--color-primary);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .cal-cell.empty{background:transparent}
  .cal-day-num{font-size:12px;color:#fff;line-height:1;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .cal-bars{display:flex;flex-direction:column;gap:2px}
  .cal-bar{font-size:9px;border-radius:2px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;opacity:.9}

  /* Prenotazioni cards nuove */
  .pren-list{display:flex;flex-direction:column;gap:var(--sp-3)}
  .pren-card{
    background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:var(--r-md);
    padding:var(--sp-4);transition:background .15s;
  }
  .pren-card:hover{background:rgba(255,255,255,.09)}
  .pren-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--sp-3)}
  .pren-project{font-weight:700;font-size:15px;color:#fff}
  .pren-who{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
  .pren-dates{display:flex;gap:6px;align-items:center;margin-top:var(--sp-3)}
  .pren-date-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r-pill);padding:3px 10px;font-size:12px;color:#fff;font-family:var(--font-display)}
  .pren-date-arrow{color:rgba(255,255,255,.4);font-size:12px}
  .pren-codici{margin-top:var(--sp-3);display:flex;flex-wrap:wrap;gap:4px}
  .pren-codice-tag{background:rgba(17,159,166,.15);border:1px solid rgba(17,159,166,.3);border-radius:4px;padding:2px 7px;font-size:11px;font-family:var(--font-display);color:rgba(255,255,255,.85)}
  .pren-footer{margin-top:var(--sp-3);display:flex;justify-content:flex-end}
  .btn-cancella{background:rgba(196,51,51,.2);border:1px solid rgba(196,51,51,.4);color:#ff9090;border-radius:var(--r-pill);padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-cancella:hover{background:rgba(196,51,51,.4)}
</style>
</head>
<body>
<div class="aura-bg"></div>
<div class="app" id="aura-shell"></div>

<script src="/aura.js"></script>
<script>
  auraShell({ active: 'attrezzatura' });

  const main = document.getElementById('aura-main');
  main.innerHTML = `
    <div>
      <h2 class="section-title">Nuova Prenotazione</h2>

      <label class="form-label required">Articoli</label>
      <div class="form-row" style="gap:8px">
        <select class="select" id="f-tipo" style="flex:2"></select>
        <input class="input" id="f-qta" type="number" min="1" value="1" style="max-width:80px" />
        <button class="btn btn-primary" onclick="aggiungiArticolo()" style="flex:0 0 auto">Aggiungi</button>
      </div>
      <div class="carrello" id="carrello"></div>
      <div id="cart-warning"></div>

      <div class="form-row">
        <div>
          <label class="form-label required">Data inizio</label>
          <input class="input" id="f-dal" type="text" placeholder="Seleziona data…" required />
        </div>
        <div>
          <label class="form-label">Data fine</label>
          <input class="input" id="f-al" type="text" placeholder="Seleziona data…" />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label class="form-label">Ora inizio</label>
          <select class="select" id="f-oin">
            <option value="">— nessuna —</option>
            <option value="06:00">06:00</option><option value="09:00">09:00</option>
            <option value="12:00">12:00</option><option value="15:00">15:00</option>
            <option value="18:00">18:00</option><option value="21:00">21:00</option>
          </select>
        </div>
        <div>
          <label class="form-label">Ora fine</label>
          <select class="select" id="f-ofin">
            <option value="">— nessuna —</option>
            <option value="08:00">08:00</option><option value="11:00">11:00</option>
            <option value="14:00">14:00</option><option value="17:00">17:00</option>
            <option value="20:00">20:00</option><option value="23:00">23:00</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label class="form-label required">Chi prenota</label>
          <input class="input" id="f-chi" placeholder="Es. Matteo" required />
        </div>
        <div>
          <label class="form-label required">Progetto</label>
          <input class="input" id="f-prog" placeholder="Es. Podcast Ep.5" required />
        </div>
      </div>

      <div style="display:flex;gap:var(--sp-3);margin-top:var(--sp-4)">
        <button class="btn btn-ghost" onclick="verifica()">Verifica</button>
        <button class="btn btn-primary" id="btn-prenota" onclick="prenota()">Prenota</button>
      </div>
      <div id="form-msg"></div>
    </div>

    <div>
      <h2 class="section-title">Calendario</h2>
      <div class="cal-wrap">
        <div class="cal-header">
          <button class="cal-nav-btn" onclick="calMese(-1)">‹</button>
          <div class="cal-month" id="cal-month-label"></div>
          <button class="cal-nav-btn" onclick="calMese(+1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <div>
      <h2 class="section-title">Tutte le prenotazioni</h2>
      <div class="pren-list" id="lista-pren"></div>
    </div>

    <div>
      <h2 class="section-title">Inventario</h2>
      <input class="input inv-search" id="inv-search" placeholder="Cerca per codice o nome…" />
      <div class="inv-groups" id="inv-groups"></div>
    </div>
  `;

  const API = "";
  let inventario = [], riepilogo = [], prenotazioni = [];
  let carrello = [], validaSeq = 0, stockTotale = {};
  let calAnno = new Date().getFullYear(), calMeseIdx = new Date().getMonth();

  const CAL_COLORS = ['#119FA6','#FF9D0A','#9B59B6','#E74C3C','#2ECC71','#F1948A','#5DADE2','#A9DFBF'];
  const MESI_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const DOW_IT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

  function calMese(delta){
    calMeseIdx += delta;
    if(calMeseIdx > 11){ calMeseIdx = 0; calAnno++; }
    if(calMeseIdx < 0){ calMeseIdx = 11; calAnno--; }
    renderCalendario();
  }

  function renderCalendario(){
    const label = document.getElementById('cal-month-label');
    const grid  = document.getElementById('cal-grid');
    if(!label || !grid) return;
    label.textContent = `${MESI_IT[calMeseIdx]} ${calAnno}`;

    // intestazione giorni settimana
    let html = DOW_IT.map(d => `<div class="cal-dow">${d}</div>`).join('');

    const primoGiorno = new Date(calAnno, calMeseIdx, 1);
    // Monday-based offset (0=Mon … 6=Sun)
    let startOffset = (primoGiorno.getDay() + 6) % 7;
    const giorniMese = new Date(calAnno, calMeseIdx + 1, 0).getDate();
    const oggi = new Date();

    // celle vuote prima del 1
    for(let i = 0; i < startOffset; i++) html += `<div class="cal-cell empty"></div>`;

    for(let g = 1; g <= giorniMese; g++){
      const dataCell = new Date(calAnno, calMeseIdx, g);
      const isToday = dataCell.toDateString() === oggi.toDateString();
      const cellISO = `${calAnno}-${String(calMeseIdx+1).padStart(2,'0')}-${String(g).padStart(2,'0')}`;

      // prenotazioni che coprono questo giorno
      const bars = prenotazioni
        .filter(p => {
          const da = p.data_inizio ? p.data_inizio.slice(0,10) : null;
          const al = p.data_fine  ? p.data_fine.slice(0,10)   : da;
          return da && cellISO >= da && cellISO <= (al || da);
        })
        .map((p) => {
          const colorIdx = Math.abs(p.gruppo_id.split('').reduce((a,c)=>a+c.charCodeAt(0),0)) % CAL_COLORS.length;
          const label = p.progetto || p.prenotato_da || 'Pren.';
          return `<div class="cal-bar" style="background:${CAL_COLORS[colorIdx]};cursor:pointer" onclick="mostraDettaglioCal('${p.gruppo_id}')">${label}</div>`;
        }).join('');

      html += `<div class="cal-cell${isToday?' today':''}">
        <div class="cal-day-num">${g}</div>
        <div class="cal-bars">${bars}</div>
      </div>`;
    }

    grid.innerHTML = html;
  }

  function mostraDettaglioCal(gid){
    const p = prenotazioni.find(x => x.gruppo_id === gid);
    if(!p) return;
    const colorIdx = Math.abs(gid.split('').reduce((a,c)=>a+c.charCodeAt(0),0)) % CAL_COLORS.length;
    const color = CAL_COLORS[colorIdx];
    const dI = formatDate(p.data_inizio);
    const dF = formatDate(p.data_fine);
    const orario = p.ora_inizio ? `${p.ora_inizio}${p.ora_fine?' – '+p.ora_fine:''}` : '—';
    const codici = (p.pezzi||[]).map(x =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px">
        <span style="font-family:var(--font-display);color:#fff">${x.codice}</span>
        <span style="color:rgba(255,255,255,.55)">${x.nome||x.tipo}</span>
       </div>`
    ).join('');

    const modal = document.createElement('div');
    modal.className = 'modal-backdrop show';
    modal.innerHTML = `
      <div class="modal-box" style="max-width:480px">
        <div style="height:4px;background:${color};border-radius:4px 4px 0 0;margin:-24px -24px 20px"></div>
        <div class="modal-head">
          <div>
            <div class="modal-title">${p.progetto || 'Prenotazione'}</div>
            <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:3px">Prenotato da ${p.prenotato_da||'—'}</div>
          </div>
          <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>
        </div>
        <div class="modal-grid">
          <div class="modal-field">
            <div class="modal-label">Data inizio</div>
            <div class="modal-value">${dI}</div>
          </div>
          <div class="modal-field">
            <div class="modal-label">Data fine</div>
            <div class="modal-value">${dF}</div>
          </div>
          <div class="modal-field">
            <div class="modal-label">Orario</div>
            <div class="modal-value">${orario}</div>
          </div>
          <div class="modal-field">
            <div class="modal-label">Pezzi totali</div>
            <div class="modal-value">${p.n_pezzi}</div>
          </div>
        </div>
        <div class="modal-label" style="margin-bottom:8px">Attrezzatura</div>
        <div style="background:rgba(255,255,255,.04);border-radius:var(--r-sm);padding:0 var(--sp-3)">
          ${codici || '<div style="color:rgba(255,255,255,.4);font-size:13px;padding:8px 0">Nessun pezzo</div>'}
        </div>
        <div style="display:flex;gap:var(--sp-3);margin-top:var(--sp-5)">
          <button class="btn btn-ghost" onclick="this.closest('.modal-backdrop').remove()">Chiudi</button>
          <button class="btn-cancella" onclick="if(confirm('Cancellare questa prenotazione?')){cancella('${p.gruppo_id}');this.closest('.modal-backdrop').remove()}">Cancella</button>
        </div>
      </div>`;
    modal.addEventListener('click', e => { if(e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  }

  async function caricaTutto(){
    try{
      const [inv, rie, pren] = await Promise.all([
        fetch(API+'/api/inventario').then(r=>r.json()),
        fetch(API+'/api/inventario/riepilogo').then(r=>r.json()),
        fetch(API+'/api/prenotazioni').then(r=>r.json()),
      ]);
      inventario = inv.data; riepilogo = rie.data; prenotazioni = pren.data;
      renderInventario(); renderLista(); popolaTipi(); renderCalendario();
    }catch(e){ alert('Errore caricamento: '+e.message); }
  }

  function renderInventario(){
    const cont = document.getElementById('inv-groups');
    const groups = {};
    inventario.forEach(i => {
      (groups[i.macro]=groups[i.macro]||[]).push(i);
    });
    cont.innerHTML = Object.keys(groups).sort().map(macro => `
      <div>
        <div class="inv-group-title">${macro}</div>
        ${groups[macro].map(i => `
          <div class="inv-item">
            <span><span class="inv-code">${i.codice}</span> ${i.nome||'(senza nome)'}</span>
            <span class="inv-badge">${i.tipo}</span>
          </div>`).join('')}
      </div>`).join('');
  }

  function popolaTipi(){
    const tipi = [...new Set(riepilogo.map(r=>r.tipo))].sort();
    const fTipo = document.getElementById('f-tipo');
    fTipo.innerHTML = riepilogo.map(r=>`<option value="${r.tipo}">${r.tipo} (${r.n})</option>`).join('');
    stockTotale = {};
    riepilogo.forEach(r => stockTotale[r.tipo] = r.n);
    aggiornaMaxQta();
  }

  function aggiornaMaxQta(){
    const tipo = document.getElementById('f-tipo').value;
    const max = stockTotale[tipo] || 1;
    const inp = document.getElementById('f-qta');
    inp.max = max;
    if((parseInt(inp.value)||1) > max) inp.value = max;
  }

  function aggiungiArticolo(){
    const tipo = document.getElementById('f-tipo').value;
    const qta = parseInt(document.getElementById('f-qta').value)||1;
    if(!tipo) return;
    const esistente = carrello.find(a=>a.tipo===tipo);
    if(esistente) esistente.quantita += qta;
    else carrello.push({tipo, quantita:qta, disponibili:null});
    document.getElementById('f-qta').value = 1;
    renderCarrello();
    validaCarrello();
  }

  function rimuoviArticolo(i){ carrello.splice(i,1); renderCarrello(); validaCarrello(); }

  function statoArticolo(a){
    const stock = (a.tipo in stockTotale) ? stockTotale[a.tipo] : null;
    if(stock!=null && a.quantita > stock) return {over:true, note:`solo ${stock} in magazzino`};
    if(a.disponibili!=null && a.quantita > a.disponibili) return {over:true, note:`solo ${a.disponibili} liberi`};
    if(a.disponibili!=null) return {over:false, note:`✓ ${a.disponibili} liberi`, ok:true};
    return {over:false, note:''};
  }

  function renderCarrello(){
    const c = document.getElementById('carrello');
    const warn = document.getElementById('cart-warning');
    const btn = document.getElementById('btn-prenota');
    if(!carrello.length){
      c.innerHTML = '<div class="cart-empty">Nessun articolo — aggiungine sopra.</div>';
      warn.innerHTML = '';
      btn.disabled = false;
      return;
    }
    let anyOver = false;
    c.innerHTML = carrello.map((a,i) => {
      const s = statoArticolo(a);
      if(s.over) anyOver = true;
      return `<div class="cart-item ${s.over?'over':''}">
        <span><span class="cart-item-qty">${a.quantita}×</span>${a.tipo} ${s.note}</span>
        <button class="cart-item-del" onclick="rimuoviArticolo(${i})">×</button>
      </div>`;
    }).join('');
    if(anyOver){
      warn.innerHTML = '<div style="background:rgba(196,51,51,.2);border:1px solid #7a1f3f;border-radius:var(--r-sm);padding:var(--sp-3);color:#ff9fb5;margin-top:var(--sp-3);font-size:13px">⚠️ Riduci quantità: alcuni articoli superano la disponibilità</div>';
      btn.disabled = true;
    }else{
      warn.innerHTML = '';
      btn.disabled = false;
    }
  }

  async function validaCarrello(){
    if(!carrello.length) return;
    const f = {dal:document.getElementById('f-dal').value, al:document.getElementById('f-al').value, oin:document.getElementById('f-oin').value, ofin:document.getElementById('f-ofin').value};
    const mySeq = ++validaSeq;
    if(!f.dal){ carrello.forEach(a=>a.disponibili=null); renderCarrello(); return; }
    try{
      await Promise.all(carrello.map(async a => {
        const qs = new URLSearchParams({tipo:a.tipo,data_inizio:f.dal,data_fine:f.al||f.dal,ora_inizio:f.oin,ora_fine:f.ofin});
        try{ const d = await fetch(API+'/api/disponibilita?'+qs).then(r=>r.json()); a.disponibili = d.disponibili.length; }
        catch(_){ a.disponibili = null; }
      }));
    }finally{
      if(mySeq === validaSeq) renderCarrello();
    }
  }

  async function verifica(){
    const f = {dal:document.getElementById('f-dal').value, al:document.getElementById('f-al').value, oin:document.getElementById('f-oin').value, ofin:document.getElementById('f-ofin').value};
    if(!carrello.length){ alert('Aggiungi articoli'); return; }
    if(!f.dal){ alert('Data inizio obbligatoria'); return; }
    try{
      const righe = [];
      for(const a of carrello){
        const qs = new URLSearchParams({tipo:a.tipo,data_inizio:f.dal,data_fine:f.al||f.dal,ora_inizio:f.oin,ora_fine:f.ofin});
        const d = await fetch(API+'/api/disponibilita?'+qs).then(r=>r.json());
        const ok = d.disponibili.length >= a.quantita;
        righe.push(`${ok?'✓':'✗'} ${a.quantita}× ${a.tipo} — liberi ${d.disponibili.length}/${d.totale}`);
      }
      alert(righe.join('\n'));
    }catch(e){ alert('Errore: '+e.message); }
  }

  async function prenota(){
    const f = {dal:document.getElementById('f-dal').value, al:document.getElementById('f-al').value, oin:document.getElementById('f-oin').value, ofin:document.getElementById('f-ofin').value, chi:document.getElementById('f-chi').value, prog:document.getElementById('f-prog').value};
    const errori = [];
    if(!carrello.length) errori.push("Aggiungi articoli");
    if(!f.dal) errori.push("Data inizio obbligatoria");
    if(!f.chi) errori.push("Chi prenota obbligatorio");
    if(!f.prog) errori.push("Progetto obbligatorio");
    if(errori.length){ alert(errori.join('\n')); return; }
    if(carrello.some(a=>statoArticolo(a).over)){ alert('Riduci quantità'); return; }
    try{
      const payload = {data_inizio:f.dal, data_fine:f.al, ora_inizio:f.oin, ora_fine:f.ofin, prenotato_da:f.chi, progetto:f.prog, articoli:carrello};
      const r = await fetch(API+'/api/prenotazioni',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data = await r.json();
      if(!r.ok) throw new Error(data.detail);
      alert(`✅ Prenotato id ${data.gruppo_id} — ${data.totale_pezzi} pezzi`);
      carrello = []; renderCarrello();
      const pren = await fetch(API+'/api/prenotazioni').then(r=>r.json());
      prenotazioni = pren.data;
      renderLista(); renderCalendario();
    }catch(e){ alert('Errore: '+e.message); }
  }

  function formatDate(dateStr){
    if(!dateStr) return '—';
    const [y,m,d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function renderLista(){
    const cont = document.getElementById('lista-pren');
    if(!prenotazioni.length){
      cont.innerHTML='<div style="color:rgba(255,255,255,.5);font-size:13px;padding:var(--sp-4)">Nessuna prenotazione ancora.</div>';
      return;
    }
    cont.innerHTML = prenotazioni.map(p => {
      const dI = formatDate(p.data_inizio);
      const dF = formatDate(p.data_fine);
      const orario = p.ora_inizio ? ` · ${p.ora_inizio}${p.ora_fine?'–'+p.ora_fine:''}` : '';
      const codici = (p.pezzi||[]).map(x => `<span class="pren-codice-tag">${x.codice}</span>`).join('');
      return `<div class="pren-card">
        <div class="pren-card-top">
          <div>
            <div class="pren-project">${p.progetto||'Senza nome'}</div>
            <div class="pren-who">${p.prenotato_da||''}${orario}</div>
          </div>
        </div>
        <div class="pren-dates">
          <span class="pren-date-pill">${dI}</span>
          ${p.data_fine ? `<span class="pren-date-arrow">→</span><span class="pren-date-pill">${dF}</span>` : ''}
        </div>
        <div class="pren-codici">${codici}</div>
        <div class="pren-footer">
          <button class="btn-cancella" onclick="if(confirm('Cancellare questa prenotazione?')) cancella('${p.gruppo_id}')">Cancella</button>
        </div>
      </div>`;
    }).join('');
  }

  async function cancella(gid){
    try{
      const r = await fetch(API+'/api/prenotazioni/'+gid,{method:'DELETE'});
      if(!r.ok) throw new Error((await r.json()).detail);
      const pren = await fetch(API+'/api/prenotazioni').then(r=>r.json());
      prenotazioni = pren.data;
      renderLista(); renderCalendario();
    }catch(e){ alert('Errore: '+e.message); }
  }

  function apriDettaglio(gid){
    const p = prenotazioni.find(x=>x.gruppo_id===gid);
    if(!p) return;
    const modal = document.createElement('div');
    modal.className = 'modal-backdrop show';
    modal.innerHTML = `
      <div class="modal-box">
        <div class="modal-head">
          <div><div class="modal-title">${p.progetto||'Prenotazione'}</div><div style="font-size:12px;color:var(--text-on-dark-muted)">id ${p.gruppo_id}</div></div>
          <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>
        </div>
        <div class="modal-grid">
          <div class="modal-field"><div class="modal-label">Periodo</div><div class="modal-value">📅 ${formatDate(p.data_inizio)}→${formatDate(p.data_fine)}</div></div>
          <div class="modal-field"><div class="modal-label">Chi prenota</div><div class="modal-value">👤 ${p.prenotato_da||'—'}</div></div>
        </div>
        <div class="modal-label">Attrezzatura (${p.n_pezzi} pezzi)</div>
        <div class="modal-items">${(p.pezzi||[]).map(x => `<div class="modal-item">${x.tipo} — ${x.nome} <span style="color:var(--text-on-dark-muted)">(${x.codice})</span></div>`).join('')}</div>
        <div style="display:flex;gap:var(--sp-3);margin-top:var(--sp-4)">
          <button class="btn btn-ghost" onclick="this.closest('.modal-backdrop').remove()">Chiudi</button>
          <button class="btn btn-primary" style="background:var(--color-error)" onclick="if(confirm('Cancellare?')) {cancella('${p.gruppo_id}'); this.closest('.modal-backdrop').remove()}">Cancella</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  // Flatpickr datepicker
  const today = new Date();
  flatpickr('#f-dal', {locale:'it', dateFormat:'d/m/Y', defaultDate:today, minDate:today, onChange:()=>validaCarrello()});
  flatpickr('#f-al', {locale:'it', dateFormat:'d/m/Y', defaultDate:today, minDate:today, onChange:()=>validaCarrello()});

  document.getElementById('f-tipo').addEventListener('change', aggiornaMaxQta);

  renderCarrello();
  caricaTutto();
</script>
</body>
</html>
